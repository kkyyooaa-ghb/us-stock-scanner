name: 美股盤前掃描排程

# V1.0.2-US(2026-06-14):排程改 cron-job.org 觸發(GitHub schedule 實測漏跑/延遲)
# ═══════════════════════════════════════════════════════════════
# 變更原因:V1.0.1 的 GitHub 雙 cron 在實測中 6/13(五)漏跑、6/15(日)週報延遲
#   2 小時 — 與台股 V13.9.3 棄用 GitHub schedule 的病因相同(runner 短缺時
#   schedule 不保證觸發)。改由 cron-job.org 打 workflow_dispatch,觸發可靠。
#
# cron-job.org 設定(見 SETUP.md §3,一次性):
#   URL    : https://api.github.com/repos/kkyyooaa-ghb/us-stock-scanner/actions/workflows/scan.yml/dispatches
#   Method : POST
#   Headers: Authorization: Bearer <PAT(需 Actions: Read and write)>
#            Accept: application/vnd.github+json
#            Content-Type: application/json
#   Body   : {"ref":"main"}
#   時區   : America/New_York   ← 關鍵,DST 自動處理
#   排程   : 週一~週五 09:00(美東)= 台北 21:00 夏令 / 22:00 冬令
#
# 程式內護欄不變:main.py 只在 08:30-09:30 ET 窗內寫 Notion(窗外補跑勾 force)。
# 註:已移除 schedule 觸發,避免與 cron-job.org 重複開火;手動測試/補跑用
#    下方 workflow_dispatch(GitHub UI 的 Run workflow 仍可手動觸發)。
# ═══════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      force_notion_sync:
        description: '非排程時段強制寫入 Notion(補跑用,平常勿勾)'
        type: boolean
        required: false
        default: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20            # 含 P7.5 LLM enrichment buffer(沿用台股 V13.11.0)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v5

      - name: 設定 Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝相依套件
        run: pip install -r requirements.txt

      - name: 執行掃描
        env:
          NOTION_TOKEN:      ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID:      ${{ secrets.NOTION_DB_ID }}        # 美股掃描 DB:37c323c3fc0180d3a84acdea1a5ca2af
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY:    ${{ secrets.TAVILY_API_KEY }}
          FORCE_NOTION_SYNC: ${{ github.event.inputs.force_notion_sync }}
        run: python main.py

      - name: 確保結果檔存在
        if: always()
        run: |
          if [ ! -f scan_result.csv ]; then
            echo "Ticker,Price,MA20,MA60,VolRatio,Support,Resistance,Position,Status,Priority,Score,ConsecDays,DistMA60Pct,DistTag,EntryLow,EntryHigh,StopLoss,ATR,ATR_Pct,DistDirection,DistATRMult,YoY,PreGapPct" > scan_result.csv
          fi

      - name: 上傳掃描結果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-result-${{ github.run_id }}
          path: scan_result.csv
          retention-days: 30
